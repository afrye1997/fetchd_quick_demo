<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>NWA · Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eef1f8;
  --navy: #21356A;
  --navy-mid: #2d4a8a;
  --navy-pale: #b8c8e8;
  --card: #f8faff;
  --border: #d4dcec;
  --border-soft: #e4eaf4;
  --muted: #6a85b0;
  --muted-soft: #8ea3c7;
  --accent-gold: #d4a64a;
  --accent-gold-dark: #8a6a28;
  --accent-green: #4a8a6a;
  --accent-purple: #7a5bc4;
  --accent-terracotta: #c47a5a;
  --accent-red: #e04545;
  --shadow-sm: 0 1px 2px rgba(33, 53, 106, 0.04);
  --shadow-md: 0 4px 16px rgba(33, 53, 106, 0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  background: #2a2d35;
  font-family: 'Instrument Sans', sans-serif;
  color: var(--navy);
  min-height: 100vh;
  padding: 40px 20px 60px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow-x: hidden;
}
.device-frame {
  width: 430px; height: 902px;
  background: #1a1c22; border-radius: 58px; padding: 14px;
  position: relative;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
  flex-shrink: 0;
}
.dynamic-island {
  position: absolute;
  top: 24px; left: 50%;
  transform: translateX(-50%);
  width: 126px; height: 37px;
  background: #000; border-radius: 20px;
  z-index: 100;
  pointer-events: none;
}
.device-screen {
  width: 402px; height: 874px;
  background: var(--bg);
  border-radius: 46px;
  overflow: hidden;
  position: relative;
}
.device-screen-inner {
  width: 100%; height: 100%;
  overflow-y: auto; overflow-x: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.device-screen-inner::-webkit-scrollbar { display: none; }

/* Shared auth chrome */
.auth-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: max(env(safe-area-inset-top, 18px), 60px) 20px max(env(safe-area-inset-bottom, 18px), 28px);
  background: var(--bg);
  min-height: 100%;
  position: relative;
}
.auth-logo {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}
.auth-logo img {
  height: 32px;
  width: auto;
  display: block;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  padding: 6px 0;
  margin-bottom: 18px;
  -webkit-tap-highlight-color: transparent;
  align-self: flex-start;
  transition: color 0.15s;
  position: relative;
  z-index: 2;
}
.back-link:active { color: var(--navy); }
.back-link svg {
  width: 14px; height: 14px;
  stroke: currentColor; stroke-width: 2;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
}
.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 20px;
  box-shadow: var(--shadow-sm), var(--shadow-md);
  position: relative;
  z-index: 2;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent-gold-dark);
  margin-bottom: 6px;
  display: block;
}
.page-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 28px;
  font-weight: 500;
  color: var(--navy);
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  line-height: 1.15;
  position: relative;
  z-index: 2;
}
.page-subtitle {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.45;
  margin-bottom: 20px;
  position: relative;
  z-index: 2;
}
.btn {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.18s;
  -webkit-tap-highlight-color: transparent;
  text-align: center;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn:active { transform: scale(0.99); }
.btn-primary {
  background: linear-gradient(135deg, var(--navy), var(--navy-mid));
  color: white;
  box-shadow: 0 2px 8px rgba(33, 53, 106, 0.18);
}
.btn-primary:active { box-shadow: 0 1px 4px rgba(33, 53, 106, 0.2); }
.btn-secondary {
  background: white;
  color: var(--navy);
  border: 1.5px solid var(--border);
}
.btn-secondary:active {
  background: var(--bg);
  border-color: var(--navy-pale);
}

/* PAW PRINT PATTERN BACKDROP — sits behind everything in .auth-page,
   subtle, scattered, navy-pale color so it reads like wallpaper */
.paw-pattern {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}
.paw-pattern svg {
  position: absolute;
  fill: var(--navy-pale);
  opacity: 0.32;
}

/* Page-specific styles */

.welcome-hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 2;
}
/* Welcome card — generous, warm, confident */
.welcome-card {
  position: relative;
  overflow: hidden;
  text-align: center;
  padding: 48px 28px 36px;
  border-radius: 20px;
  box-shadow: 
    0 1px 2px rgba(33, 53, 106, 0.04),
    0 8px 28px rgba(33, 53, 106, 0.08);
  background: linear-gradient(180deg, #ffffff 0%, #fdfcf9 100%);
  border-color: var(--border-soft);
}
.welcome-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 5px;
  background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-dark));
}
.welcome-card > * { position: relative; z-index: 1; }
/* Headline: mix Cormorant italic + Instrument Sans bold for warm-confident voice */
/* Logo inside the card, above the headline */
.welcome-card-logo {
  display: block;
  height: 88px;
  width: auto;
  margin: 0 auto 24px;
}
.welcome-headline {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 32px;
  font-weight: 500;
  color: var(--navy);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 4px;
  white-space: nowrap;
}
.welcome-headline-strong {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -0.02em;
  text-transform: none;
  color: var(--navy);
  line-height: 1.1;
}
.welcome-tagline {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.5;
  margin: 22px 0 32px;
  padding: 0 6px;
  font-weight: 400;
}
.welcome-actions {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}
.welcome-actions .btn-primary {
  width: 100%;
  padding: 17px;
  font-size: 16px;
}
.welcome-signin-link {
  font-size: 14px;
  color: var(--muted);
  text-decoration: none;
  padding: 6px 12px;
  font-weight: 500;
  -webkit-tap-highlight-color: transparent;
}
.welcome-signin-link strong {
  color: var(--navy);
  font-weight: 600;
  margin-left: 2px;
}
.welcome-signin-link:active strong { opacity: 0.6; }
.welcome-skip-link {
  font-size: 13px;
  color: var(--muted-soft);
  text-decoration: none;
  padding: 6px 12px;
  font-weight: 500;
  -webkit-tap-highlight-color: transparent;
  margin-top: -4px;
}
.welcome-skip-link:active { color: var(--muted); }
.welcome-footer {
  text-align: center;
  margin-top: 22px;
  font-size: 12px;
  color: var(--muted-soft);
  line-height: 1.5;
  position: relative;
  z-index: 2;
}
.welcome-footer a {
  color: var(--muted);
  text-decoration: none;
  font-weight: 500;
}


/* ═══════════════════════════════════════════════════════════
   REAL DEVICE MODE — strip mockup chrome on actual mobile/desktop
   ═══════════════════════════════════════════════════════════ */

  padding: 0 !important;
  margin: 0 !important;
  min-height: 100vh !important;
  min-height: 100dvh !important;
  width: 100% !important;
  overflow-x: hidden !important;
}
body {
  display: block !important;
  align-items: initial !important;
  justify-content: initial !important;
}
.device-frame {
  width: 100% !important;
  height: auto !important;
  min-height: 100vh !important;
  min-height: 100dvh !important;
  background: var(--bg, #eef1f8) !important;
  border-radius: 0 !important;
  padding: 0 !important;
  box-shadow: none !important;
}
.dynamic-island { display: none !important; }
.device-screen {
  width: 100% !important;
  height: auto !important;
  min-height: 100vh !important;
  min-height: 100dvh !important;
  border-radius: 0 !important;
  background: var(--bg, #eef1f8) !important;
}
.device-screen-inner {
  height: auto !important;
  min-height: 100vh !important;
  min-height: 100dvh !important;
}
</style>
