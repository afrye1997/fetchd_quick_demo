<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>NWA · Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eef1f8;
  --navy: #21356A;
  --navy-mid: #2d4a8a;
  --navy-pale: #b8c8e8;
  --card: #f8faff;
  --border: #d4dcec;
  --muted: #6a85b0;
  --accent-red: #e04545;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  background: #2a2d35;
  font-family: 'Instrument Sans', sans-serif;
  color: var(--navy);
  min-height: 100vh;
  padding: 40px 20px 60px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow-x: hidden;
}

.device-frame {
  width: 430px; height: 902px;
  background: #1a1c22; border-radius: 58px; padding: 14px;
  position: relative;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
  flex-shrink: 0;
}
.dynamic-island {
  position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
  width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 100;
  pointer-events: none;
}
.device-screen {
  width: 402px; height: 874px; background: var(--bg);
  border-radius: 46px; overflow: hidden; position: relative;
  display: flex; flex-direction: column;
}

.header {
  padding: 46px 18px 14px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1.5px solid rgba(33, 53, 106, 0.12);
  background: rgba(238, 241, 248, 0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  position: relative; z-index: 30;
}
.header-logo { height: 36px; flex-shrink: 0; display: flex; align-items: center; }
.header-logo img { height: 100%; width: auto; display: block; }
.header-date {
  flex: 1; font-size: 10px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase;
  text-align: right; padding-right: 4px; line-height: 1.1;
}
.bell-btn {
  width: 38px; height: 38px; background: white;
  border: 1px solid var(--border); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; flex-shrink: 0;
  transition: all 0.15s;
}
.bell-btn:active { transform: scale(0.94); }
.bell-btn svg { width: 17px; height: 17px; stroke: var(--navy); stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.bell-badge {
  position: absolute; top: -3px; right: -3px;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--accent-red); color: white;
  border: 2px solid var(--bg); border-radius: 999px;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  line-height: 1; letter-spacing: -0.01em;
}

.content {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 30px 100px; text-align: center;
}
.icon {
  width: 84px; height: 84px; margin-bottom: 24px;
  border-radius: 50%;
  background: white; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(33, 53, 106, 0.08);
}
.icon svg { width: 36px; height: 36px; stroke: var(--muted); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 500;
  color: var(--navy);
  letter-spacing: -0.015em;
  margin-bottom: 10px;
  line-height: 1.1;
}
.title em { font-style: italic; }
.sub {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
  max-width: 280px;
  margin-bottom: 24px;
}
.badge {
  display: inline-flex;
  padding: 5px 12px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 10px; font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.14em; text-transform: uppercase;
}

.nav {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1.5px solid rgba(33, 53, 106, 0.12);
  padding: 8px 0 18px;
  z-index: 20;
}
.nav-inner { display: flex; align-items: stretch; }
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; padding: 10px 4px;
  cursor: pointer; color: var(--muted);
  transition: color 0.15s;
  min-height: 58px; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.nav-item:active { opacity: 0.6; }
.nav-item:not(:last-child)::after {
  content: ''; position: absolute; right: 0; top: 10px; bottom: 10px;
  width: 1px; background: rgba(33, 53, 106, 0.1);
}
.nav-item.active { color: var(--navy); }
.nav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.nav-icon svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.nav-item.active .nav-icon svg { fill: currentColor; stroke: currentColor; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; line-height: 1; }
.nav-item.active .nav-label { font-weight: 700; }

@keyframes nwa-bell-shake {
  0%, 100% { transform: rotate(0); }
  20% { transform: rotate(-10deg); }
  40% { transform: rotate(8deg); }
  60% { transform: rotate(-6deg); }
  80% { transform: rotate(4deg); }
}
.bell-btn.shaking { animation: nwa-bell-shake 0.4s; }

/* ═══════════════════════════════════════════════════════════
   REAL DEVICE MODE — strip mockup chrome, fill real viewport
   ═══════════════════════════════════════════════════════════ */
html, body {
  background: var(--bg, #eef1f8) !important;
  padding: 0 !important;
  margin: 0 !important;
  min-height: 100vh !important;
  min-height: 100dvh !important;
  width: 100% !important;
  overflow-x: hidden !important;
}
body {
  display: block !important;
  align-items: initial !important;
  justify-content: initial !important;
}
.device-frame {
  width: 100% !important;
  height: auto !important;
  min-height: 100vh !important;
  min-height: 100dvh !important;
  background: var(--bg, #eef1f8) !important;
  border-radius: 0 !important;
  padding: 0 !important;
  box-shadow: none !important;
}
.dynamic-island {
  display: none !important;
}
.device-screen {
  width: 100% !important;
  height: auto !important;
  min-height: 100vh !important;
  min-height: 100dvh !important;
  border-radius: 0 !important;
  background: var(--bg, #eef1f8) !important;
}
.device-screen-inner {
  height: auto !important;
  min-height: 100vh !important;
  min-height: 100dvh !important;
}
/* Respect real iPhone safe areas */
.header {
  padding-top: max(env(safe-area-inset-top, 18px), 48px) !important;
}
.nav {
  padding-bottom: max(env(safe-area-inset-bottom, 18px), 18px) !important;
}


/* ═══════════════════════════════════════════════════════════
   NOTIFICATIONS POPOVER
   ═══════════════════════════════════════════════════════════ */
.notif-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(33, 53, 106, 0.24);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 90;
  display: none;
  animation: notif-backdrop-fade 0.18s ease;
}
.notif-backdrop.open { display: flex; }
@keyframes notif-backdrop-fade {
  from { opacity: 0; }
  to { opacity: 1; }
}

.notif-popover {
  position: fixed;
  top: calc(max(env(safe-area-inset-top, 18px), 48px) + 52px);
  right: 12px;
  left: 12px;
  max-width: 380px;
  margin-left: auto;
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(33, 53, 106, 0.25), 0 0 0 1px rgba(33, 53, 106, 0.06);
  z-index: 95;
  display: none;
  flex-direction: column;
  overflow: hidden;
  animation: notif-pop 0.22s cubic-bezier(0.34, 1.2, 0.64, 1);
  max-height: calc(100dvh - 120px);
}
.notif-popover.open { display: flex; }
@keyframes notif-pop {
  from { opacity: 0; transform: translateY(-8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Arrow pointing up at bell */
.notif-popover::before {
  content: '';
  position: absolute;
  top: -7px;
  right: 24px;
  width: 14px; height: 14px;
  background: white;
  transform: rotate(45deg);
  border-radius: 3px 0 0 0;
  box-shadow: -1px -1px 0 rgba(33, 53, 106, 0.06);
}

.notif-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border, #d4dcec);
}
.notif-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 500;
  color: var(--navy, #21356A);
  letter-spacing: -0.01em;
  line-height: 1;
}
.notif-title em { font-style: italic; }
.notif-close {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  background: var(--bg, #eef1f8);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  padding: 0;
}
.notif-close:active { transform: scale(0.92); }
.notif-close svg {
  width: 10px; height: 10px;
  stroke: var(--navy, #21356A);
  stroke-width: 2.5;
  fill: none;
  stroke-linecap: round;
}

.notif-list {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: none;
}
.notif-list::-webkit-scrollbar { display: none; }

.notif-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border, #d4dcec);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  background: white;
  border-left: none;
  border-right: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
  border-top: none;
}
.notif-row:last-child { border-bottom: none; }
.notif-row:active { background: var(--bg, #eef1f8); }
.notif-row.not-routable { cursor: default; }
.notif-row.not-routable:active { background: white; }

.notif-unread-dot {
  position: absolute;
  left: 6px; top: 22px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--navy, #21356A);
  display: none;
}
.notif-row.unread .notif-unread-dot { display: flex; }

.notif-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px; height: 38px;
  border-radius: 10px;
  flex-shrink: 0;
}
.notif-icon.report   { background: rgba(74, 138, 106, 0.15); color: var(--accent-green, #4a8a6a); }
.notif-icon.photos   { background: rgba(212, 166, 74, 0.18); color: var(--accent-gold-dark, #8a6a28); }
.notif-icon.upcoming { background: rgba(33, 53, 106, 0.1);   color: var(--navy, #21356A); }
.notif-icon.closure  { background: rgba(224, 69, 69, 0.12);  color: var(--accent-red, #e04545); }
.notif-icon svg {
  width: 18px; height: 18px;
  stroke: currentColor;
  stroke-width: 1.8;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.notif-body {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
  min-width: 0;
}
.notif-row-title {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--navy, #21356A);
  letter-spacing: -0.005em;
  line-height: 1.3;
}
.notif-row-title em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 14px;
}
.notif-row-sub {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 11px; font-weight: 500;
  color: var(--muted, #6a85b0);
  letter-spacing: -0.003em;
  line-height: 1.3;
}

.notif-chevron {
  display: flex;
  align-items: center;
  color: var(--muted, #6a85b0);
  flex-shrink: 0;
  margin-top: 11px;
}
.notif-chevron svg {
  width: 10px; height: 10px;
  stroke: currentColor;
  stroke-width: 2.2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.notif-row.not-routable .notif-chevron { display: none; }

.notif-footer {
  display: flex;
  padding: 10px 18px 14px;
  border-top: 1px solid var(--border, #d4dcec);
}
.notif-mark-read {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 8px;
  background: transparent;
  border: none;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--navy, #21356A);
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.15s;
}
.notif-mark-read:active { background: var(--bg, #eef1f8); }
.notif-mark-read.all-read {
  color: var(--muted, #6a85b0);
  cursor: default;
}

</style>
</head>

<script>
(function() {
  const bells = document.querySelectorAll('.bell-btn');
  const popover = document.getElementById('notifPopover');
  const backdrop = document.getElementById('notifBackdrop');
  const markReadBtn = document.getElementById('notifMarkRead');
  if (!bells.length || !popover || !backdrop) return;

  bells.forEach(bell => {
    // Remove any previous click handler (our old shake, if present) and add toggle
    bell.replaceWith(bell.cloneNode(true));
  });
  // Re-query after replacement
  document.querySelectorAll('.bell-btn').forEach(bell => {
    bell.addEventListener('click', (e) => {
      e.stopPropagation();
      if (popover.classList.contains('open')) {
        closeNotifs();
      } else {
        openNotifs();
      }
    });
  });

  // Route on routable notification click
  document.querySelectorAll('.notif-row[data-route]').forEach(row => {
    row.addEventListener('click', () => {
      let route = row.dataset.route;
      if (!route) return;
      // If this notification wants a randomized report variant, pick one at click time
      if (row.dataset.randomize === 'true' && route.includes('report-card-all.html')) {
        const variants = ['foundation', 'advanced', 'looseleash', 'housemanners', 'cgc'];
        const pick = variants[Math.floor(Math.random() * variants.length)];
        route = 'report-card-all.html#' + pick;
      }
      location.href = route;
    });
  });

  // Non-routable rows: mark read on tap (demo feedback — still in-place, no navigation)
  document.querySelectorAll('.notif-row.not-routable').forEach(row => {
    row.addEventListener('click', () => {
      row.classList.remove('unread');
      updateMarkReadBtn();
    });
  });

  window.openNotifs = function() {
    backdrop.classList.add('open');
    popover.classList.add('open');
  };
  window.closeNotifs = function() {
    backdrop.classList.remove('open');
    popover.classList.remove('open');
  };
  window.markAllRead = function() {
    document.querySelectorAll('.notif-row.unread').forEach(r => r.classList.remove('unread'));
    updateMarkReadBtn();
  };

  function updateMarkReadBtn() {
    const anyUnread = document.querySelectorAll('.notif-row.unread').length > 0;
    markReadBtn.classList.toggle('all-read', !anyUnread);
    markReadBtn.textContent = anyUnread ? 'Mark all as read' : 'All caught up';
  }
})();
</script>
